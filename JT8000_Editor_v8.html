<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JT-8000 Editor v7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap');
:root {
  --bg:#0b0e14; --bg2:#111620; --bg3:#161c28; --bg4:#1c2436;
  --bdr:#1e2a3e; --bdr2:#283850;
  --txt:#8090b0; --txt-hi:#c8d8f4; --txt-dim:#3e5070;
  --or:#f08020; --or-hi:#ffa040; --or-lo:#6a3508; --or-glow:0 0 12px rgba(240,128,32,.35);
  --grn:#28ff58; --red:#ff2828; --blu:#40a0ff; --pur:#9040ff;
  --lcd-bg:#081808; --lcd-fg:#28ff58; --lcd-glow:0 0 14px rgba(40,255,88,.3);
  --knob-arc:#f08020; --knob-track:#0a1018;
  --r:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:11px;-webkit-font-smoothing:antialiased;padding-bottom:36px}

/* === HEADER === */
.hdr{background:linear-gradient(180deg,#141a28,#0e1320);border-bottom:1px solid var(--bdr);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
.logo{font-family:'Outfit',sans-serif;font-weight:700;font-size:22px;color:var(--txt-hi);letter-spacing:2px}
.logo b{color:var(--or);text-shadow:var(--or-glow)}
.lcd{background:var(--lcd-bg);border:1px solid #183820;border-radius:var(--r);padding:4px 14px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--lcd-fg);text-shadow:var(--lcd-glow);letter-spacing:2px;min-width:180px;text-align:center}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr select,.hdr input{background:var(--bg2);border:1px solid var(--bdr);border-radius:3px;color:var(--txt-hi);font-family:inherit;font-size:10px;padding:3px 6px}
.hdr select:focus,.hdr input:focus{outline:1px solid var(--or)}
.midi-dot{width:8px;height:8px;border-radius:50%;background:#333;border:1px solid #555}
.midi-dot.ok{background:var(--grn);border-color:#1a4020;box-shadow:0 0 6px rgba(40,255,88,.5)}
.btn{font-family:inherit;font-size:9px;letter-spacing:.5px;text-transform:uppercase;padding:4px 12px;border-radius:3px;cursor:pointer;border:1px solid var(--bdr);background:var(--bg3);color:var(--txt);transition:all .1s}
.btn:hover{background:var(--bg4);color:var(--txt-hi)}
.btn:active{transform:scale(.97)}
.btn-or{border-color:var(--or-lo);color:var(--or)}.btn-or:hover{background:var(--or-lo);color:var(--or-hi);box-shadow:var(--or-glow)}
.btn-grn{border-color:#1a4a20;color:var(--grn)}.btn-grn:hover{background:#1a3a18}
.btn-red{border-color:#4a1a18;color:var(--red)}.btn-red:hover{background:#3a1210}

/* === TOOLBAR (presets + expand/collapse) === */
.toolbar{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:6px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar input.pname{background:var(--bg);border:1px solid var(--or-lo);color:var(--lcd-fg);font-size:12px;letter-spacing:1px;padding:2px 8px;border-radius:3px;width:150px}

/* === SECTION (collapsible) === */
.sec{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);margin:4px 12px;overflow:hidden;transition:margin .15s}
.sec-hdr{display:flex;align-items:center;padding:8px 12px;cursor:pointer;user-select:none;gap:8px;background:linear-gradient(90deg,var(--bg3),var(--bg2))}
.sec-hdr:hover{background:var(--bg4)}
.sec-led{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sec-title{font-family:'Outfit',sans-serif;font-weight:600;font-size:12px;color:var(--txt-hi);letter-spacing:1px;flex:1}
.sec-badge{font-size:8px;color:var(--pur);letter-spacing:1px;text-transform:uppercase}
.sec-chevron{color:var(--txt-dim);font-size:14px;transition:transform .2s}
.sec.closed .sec-chevron{transform:rotate(-90deg)}
.sec.closed .sec-body{display:none}
.sec-body{padding:8px 12px 10px;display:flex;flex-wrap:wrap;gap:6px}

/* === GROUP within section === */
.grp{display:flex;flex-direction:column;gap:4px;padding:4px 8px;border-right:1px solid var(--bdr);flex-shrink:0;min-width:0}
.grp:last-child{border-right:none}
.grp-label{font-size:8px;letter-spacing:1.5px;color:var(--txt-dim);text-transform:uppercase;padding-bottom:2px;border-bottom:1px solid #0e1420}
.grp-row{display:flex;flex-wrap:wrap;gap:5px;align-items:flex-end}

/* === STEP SEQUENCER GRID === */
.seq-grid{display:flex;gap:3px;align-items:flex-end;padding:6px 0;width:100%}
.seq-step{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;cursor:ns-resize;user-select:none;touch-action:none}
.seq-bar-wrap{width:100%;height:80px;background:#0a1018;border-radius:3px;position:relative;overflow:hidden;border:1px solid #1a2030}
.seq-bar{position:absolute;bottom:0;left:0;right:0;background:var(--or);border-radius:2px 2px 0 0;transition:height 40ms ease-out}
.seq-bar.neg{top:0;bottom:auto;background:#e04820;border-radius:0 0 2px 2px}
.seq-bar-wrap .seq-mid{position:absolute;left:0;right:0;top:50%;height:1px;background:#2e3a50;pointer-events:none}
.seq-step-num{font-size:7px;color:var(--txt-dim);margin-top:2px;font-family:'JetBrains Mono',monospace}
.seq-step.active .seq-bar-wrap{border-color:var(--or)}
.seq-step.playing .seq-step-num{color:var(--grn);font-weight:bold}
.seq-bar-val{position:absolute;left:0;right:0;text-align:center;font-size:7px;color:var(--txt);pointer-events:none;font-family:'JetBrains Mono',monospace;top:2px}

/* === KNOB === */
.kw{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:46px;cursor:ns-resize;user-select:none;touch-action:none}
.kw canvas{display:block}
.kl{font-size:7px;letter-spacing:.3px;color:var(--txt);text-align:center;text-transform:uppercase;max-width:52px;line-height:1.2}
.kv{font-size:11px;color:var(--or-hi);text-align:center;min-width:30px;line-height:1}
.kw.active .kl{color:var(--or-hi)}

/* === SELECT === */
.ew{display:flex;flex-direction:column;gap:2px;min-width:84px}
.el{font-size:7px;letter-spacing:.3px;color:var(--txt);text-transform:uppercase}
select.es{background:var(--bg);border:1px solid var(--bdr);border-radius:3px;color:var(--or-hi);font-family:inherit;font-size:11px;padding:2px 4px;cursor:pointer}
select.es:focus{outline:1px solid var(--or)}

/* === TOGGLE === */
.tw{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:42px}
.tb{width:36px;height:18px;background:var(--bg);border:1px solid var(--bdr);border-radius:9px;cursor:pointer;font-size:8px;color:var(--txt-dim);display:flex;align-items:center;justify-content:center;transition:all .12s}
.tb.on{background:var(--or-lo);border-color:var(--or);color:var(--or-hi);box-shadow:var(--or-glow)}
.tl{font-size:7px;color:var(--txt);text-transform:uppercase;text-align:center;letter-spacing:.3px}

/* === STATUS BAR === */
.sbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bdr);padding:4px 16px;display:flex;align-items:center;gap:12px;font-size:9px;z-index:50}
.sb-k{color:var(--txt-dim)}.sb-v{color:var(--txt-hi)}
.sb-sep{width:1px;height:10px;background:var(--bdr)}
.sb-r{margin-left:auto;color:var(--txt-dim);font-size:8px}

/* === MODAL === */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center}
.ov.open{display:flex}
.mb{background:var(--bg3);border:1px solid var(--or);border-radius:var(--r);padding:16px;min-width:360px;max-width:560px;box-shadow:0 8px 40px rgba(0,0,0,.9),var(--or-glow)}
.mt{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;color:var(--or-hi);margin-bottom:8px;text-transform:uppercase}
.sbox{background:var(--lcd-bg);border:1px solid #183820;border-radius:3px;padding:8px;font-size:9px;color:var(--lcd-fg);white-space:pre;overflow:auto;max-height:320px;line-height:1.5}

/* === TOAST === */
.toast{position:fixed;top:60px;right:16px;background:var(--bg4);border:1px solid var(--or);border-radius:var(--r);padding:6px 14px;font-size:10px;color:var(--or-hi);box-shadow:var(--or-glow);opacity:0;transition:opacity .15s;pointer-events:none;z-index:300}
.toast.show{opacity:1}

/* === MOBILE === */
@media(max-width:768px){
  .hdr{padding:6px 10px;gap:6px}
  .logo{font-size:16px}
  .lcd{font-size:10px;min-width:120px;padding:3px 8px}
  .sec{margin:3px 6px}
  .sec-body{padding:6px 8px;flex-direction:column}
  .grp{border-right:none;border-bottom:1px solid var(--bdr);padding-bottom:6px}
  .grp:last-child{border-bottom:none}
  .grp-row{flex-wrap:wrap}
  .kw{min-width:40px}
  .toolbar{padding:4px 10px}
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="ov" id="modal">
  <div class="mb">
    <div class="mt">Serial Export</div>
    <p style="font-size:9px;color:var(--txt);margin-bottom:8px">115200 baud &middot; PATCH:cc,val;</p>
    <div class="sbox" id="sout"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-or" onclick="copySerial()">Copy</button>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">JT<b>-8000</b></div>
  <div class="lcd" id="lcd">INIT PATCH</div>
  <div class="hdr-r">
    <select id="midiOut" style="min-width:120px"><option value="">— no output —</option></select>
    <span style="font-size:8px;color:var(--txt-dim)">CH</span>
    <select id="midiCh" style="width:40px"></select>
    <div class="midi-dot" id="mdot"></div>
    <button class="btn btn-or" onclick="sendAll()">Send All</button>
    <button class="btn" onclick="openModal()">Export</button>
    <button class="btn btn-grn" onclick="initPatch()">Init</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span style="font-size:8px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:1px">Preset</span>
  <input class="pname" id="pname" value="Init Patch" maxlength="23" oninput="document.getElementById('lcd').textContent=this.value||'—'">
  <select id="pbank" style="width:160px"><option value="">— select —</option></select>
  <button class="btn btn-or" onclick="savePreset()">Save</button>
  <button class="btn" onclick="loadPreset()">Load</button>
  <button class="btn btn-red" onclick="delPreset()">Del</button>
  <div style="flex:1"></div>
  <button class="btn" onclick="expandAll()">Expand All</button>
  <button class="btn" onclick="collapseAll()">Collapse All</button>
</div>

<!-- SECTIONS -->
<div id="panels"></div>

<!-- STATUS BAR -->
<div class="sbar">
  <span class="sb-k">CC:</span><span class="sb-v" id="stcc">—</span>
  <div class="sb-sep"></div>
  <span class="sb-k">Val:</span><span class="sb-v" id="stval">—</span>
  <div class="sb-sep"></div>
  <span class="sb-k">MIDI:</span><span class="sb-v" id="stout">—</span>
  <span class="sb-r">v8.0 &middot; JT-8000 CC Editor &middot; Drag ↕ &middot; Scroll &middot; DblClick=64</span>
</div>

<script>
'use strict';
/* === CC NUMBERS (CCDefs.h verbatim) === */
const CC={
OSC1_WAVE:21,OSC2_WAVE:22,
OSC1_PITCH_OFFSET:41,OSC2_PITCH_OFFSET:42,OSC1_DETUNE:43,OSC2_DETUNE:44,
OSC1_FINE_TUNE:45,OSC2_FINE_TUNE:46,
OSC1_FEEDBACK_AMOUNT:123,OSC2_FEEDBACK_AMOUNT:124,OSC1_FEEDBACK_MIX:125,OSC2_FEEDBACK_MIX:126,
OSC_MIX_BALANCE:47,OSC1_MIX:60,OSC2_MIX:61,
SUPERSAW1_DETUNE:77,SUPERSAW1_MIX:78,SUPERSAW2_DETUNE:79,SUPERSAW2_MIX:80,
SUB_MIX:58,NOISE_MIX:59,
OSC1_FREQ_DC:86,OSC1_SHAPE_DC:87,OSC2_FREQ_DC:88,OSC2_SHAPE_DC:89,
RING1_MIX:91,RING2_MIX:92,
OSC1_ARB_BANK:101,OSC1_ARB_INDEX:83,OSC2_ARB_BANK:102,OSC2_ARB_INDEX:85,
FILTER_CUTOFF:23,FILTER_RESONANCE:24,FILTER_ENV_AMOUNT:48,FILTER_KEY_TRACK:50,
FILTER_OCTAVE_CONTROL:84,
FILTER_ENGINE:113,FILTER_MODE:112,VA_FILTER_TYPE:115,
FILTER_OBXA_MULTIMODE:111,FILTER_OBXA_RES_MOD_DEPTH:117,
FILTER_OBXA_XPANDER_MODE:114,
AMP_ATTACK:25,AMP_DECAY:26,AMP_SUSTAIN:27,AMP_RELEASE:28,
FILTER_ENV_ATTACK:29,FILTER_ENV_DECAY:30,FILTER_ENV_SUSTAIN:31,FILTER_ENV_RELEASE:32,
PITCH_ENV_ATTACK:65,PITCH_ENV_DECAY:66,PITCH_ENV_SUSTAIN:67,PITCH_ENV_RELEASE:68,PITCH_ENV_DEPTH:69,
LFO1_FREQ:54,LFO1_DEPTH:55,LFO1_DESTINATION:56,LFO1_WAVEFORM:62,LFO1_TIMING_MODE:120,
LFO1_PITCH_DEPTH:33,LFO1_FILTER_DEPTH:34,LFO1_PWM_DEPTH:35,LFO1_AMP_DEPTH:36,LFO1_DELAY:37,
LFO2_FREQ:51,LFO2_DEPTH:52,LFO2_DESTINATION:53,LFO2_WAVEFORM:63,LFO2_TIMING_MODE:121,
LFO2_PITCH_DEPTH:38,LFO2_FILTER_DEPTH:39,LFO2_PWM_DEPTH:40,LFO2_AMP_DEPTH:57,LFO2_DELAY:64,
FX_BASS_GAIN:99,FX_TREBLE_GAIN:100,FX_DRIVE:16,
FX_MOD_EFFECT:103,FX_MOD_MIX:104,FX_MOD_RATE:105,FX_MOD_FEEDBACK:106,
FX_MOD_DEPTH:95,FX_MOD_BASE_DELAY:96,FX_MOD_TAP_COUNT:97,FX_MOD_LFO_SHAPE:98,
FX_JPFX_DELAY_EFFECT:107,FX_JPFX_DELAY_MIX:108,FX_JPFX_DELAY_FEEDBACK:109,FX_JPFX_DELAY_TIME:110,
FX_REVERB_SIZE:70,FX_REVERB_DAMP:71,FX_REVERB_LODAMP:93,FX_REVERB_BYPASS:94,FX_REVERB_MIX:75,
FX_DRY_MIX:74,FX_JPFX_MIX:76,
BPM_CLOCK_SOURCE:118,BPM_INTERNAL_TEMPO:119,DELAY_TIMING_MODE:122,
VELOCITY_AMP_SENS:10,VELOCITY_FILTER_SENS:11,VELOCITY_ENV_SENS:12,
GLIDE_ENABLE:81,GLIDE_TIME:82,POLY_MODE:14,UNISON_DETUNE:15,PITCH_BEND_RANGE:127,AMP_MOD_FIXED_LEVEL:90,
SEQ_ENABLE:2,SEQ_STEPS:3,SEQ_GATE_LENGTH:4,SEQ_SLIDE:5,SEQ_DIRECTION:6,SEQ_RATE:7,SEQ_DEPTH:8,SEQ_DESTINATION:9,SEQ_RETRIGGER:13,SEQ_STEP_SELECT:17,SEQ_STEP_VALUE:18,SEQ_TIMING_MODE:116
};

/* === OPTION LISTS === */
const wfMid=i=>Math.floor(((2*i+1)*128)/(2*14));
const WAVE_OPTS=[{v:wfMid(0),l:'Sine'},{v:wfMid(1),l:'Sawtooth'},{v:wfMid(2),l:'Square'},{v:wfMid(3),l:'Triangle'},{v:wfMid(4),l:'Arbitrary'},{v:wfMid(5),l:'Pulse'},{v:wfMid(6),l:'Saw Rev'},{v:wfMid(7),l:'S&H'},{v:wfMid(8),l:'Tri Var'},{v:wfMid(9),l:'BL Saw'},{v:wfMid(10),l:'BL Saw R'},{v:wfMid(11),l:'BL Sq'},{v:wfMid(12),l:'BL Pulse'},{v:wfMid(13),l:'Supersaw'}];
const LWAVE_OPTS=WAVE_OPTS.slice(0,13);
const lfoDstMid=i=>Math.floor(((2*i+1)*128)/(2*5));
const LFO_DEST=[{v:0,l:'None'},{v:lfoDstMid(1),l:'Pitch'},{v:lfoDstMid(2),l:'Filter'},{v:lfoDstMid(3),l:'PWM'},{v:lfoDstMid(4),l:'Amp'}];
const TIMING=[{v:0,l:'Free'},{v:11,l:'1/16'},{v:22,l:'1/8T'},{v:33,l:'1/8'},{v:44,l:'1/4T'},{v:55,l:'1/4'},{v:66,l:'1/2T'},{v:77,l:'1/2'},{v:88,l:'1bar'},{v:99,l:'2bar'},{v:110,l:'3bar'},{v:121,l:'4bar'}];
const MOD_FX=[{v:0,l:'Off'},{v:6,l:'Chorus 1'},{v:17,l:'Chorus 2'},{v:28,l:'Chorus 3'},{v:40,l:'Flanger 1'},{v:51,l:'Flanger 2'},{v:62,l:'Deep Flanger'},{v:74,l:'Phaser 1'},{v:85,l:'Phaser 2'},{v:96,l:'Phaser 3'},{v:108,l:'Phaser 4'},{v:127,l:'Super Chorus'}];
const DLY_FX=[{v:0,l:'Off'},{v:13,l:'Mono Short'},{v:38,l:'Mono Long'},{v:64,l:'Pan L>R'},{v:89,l:'Pan R>L'},{v:114,l:'Pan Stereo'}];
const CLOCK=[{v:0,l:'Internal'},{v:127,l:'External'}];
const SEQ_DIR=[{v:0,l:'Forward'},{v:42,l:'Reverse'},{v:85,l:'Bounce'},{v:127,l:'Random'}];
const SEQ_DEST=[{v:0,l:'None'},{v:32,l:'Pitch'},{v:64,l:'Filter'},{v:95,l:'PWM'},{v:127,l:'Amp'}];
const POLY=[{v:21,l:'Poly'},{v:63,l:'Mono'},{v:106,l:'Unison'}];
const DRIVE=[{v:0,l:'Bypass'},{v:32,l:'Soft Clip'},{v:96,l:'Hard Clip'}];
const MOD_TAPS=[{v:0,l:'1 Tap'},{v:127,l:'3 Tap (Ensemble)'}];
const MOD_LFO=[{v:0,l:'Triangle (BBD)'},{v:127,l:'Sine (Smooth)'}];
// NEW: Filter engine, mode, VA type
const FLT_ENG=[{v:0,l:'OBXa'},{v:127,l:'VA Bank'}];
const engMid=i=>Math.floor(((2*i+1)*128)/(2*6));
const FLT_MODE=[{v:engMid(0),l:'4-Pole LP'},{v:engMid(1),l:'2-Pole LP'},{v:engMid(2),l:'2-Pole BP'},{v:engMid(3),l:'2-Pole Push'},{v:engMid(4),l:'Xpander'},{v:engMid(5),l:'Xpander+M'}];
const vaMid=i=>Math.floor(((2*i+1)*128)/(2*13));
const VA_TYPE=[{v:vaMid(0),l:'SVF LP2'},{v:vaMid(1),l:'SVF HP2'},{v:vaMid(2),l:'SVF BP2'},{v:vaMid(3),l:'SVF Notch'},{v:vaMid(4),l:'SVF AP'},{v:vaMid(5),l:'Moog LP4'},{v:vaMid(6),l:'Moog LP2'},{v:vaMid(7),l:'Moog BP2'},{v:vaMid(8),l:'Diode LP4'},{v:vaMid(9),l:'Korg35 LP'},{v:vaMid(10),l:'Korg35 HP'},{v:vaMid(11),l:'TPT1 LP'},{v:vaMid(12),l:'TPT1 HP'}];
const XP_MODE=[{v:4,l:'LP4'},{v:13,l:'LP3'},{v:21,l:'LP2'},{v:30,l:'LP1'},{v:38,l:'HP3'},{v:47,l:'HP2'},{v:55,l:'HP1'},{v:64,l:'BP4'},{v:72,l:'BP2'},{v:81,l:'N2'},{v:89,l:'PH3'},{v:98,l:'HP2+LP1'},{v:106,l:'HP3+LP1'},{v:115,l:'N2+LP1'},{v:123,l:'PH3+LP1'}];
const PCH_OPTS=[{v:12,l:'-24 st'},{v:38,l:'-12 st'},{v:64,l:'0 st'},{v:90,l:'+12 st'},{v:116,l:'+24 st'}];

/* === FORMATTERS === */
const fMs=v=>{if(!v)return'0ms';const m=Math.round(Math.pow(v/127,2.5)*8000);return m<1000?m+'ms':(m/1000).toFixed(2)+'s'};
const fHz=v=>{const h=0.03*Math.pow(1300,v/127);return h<1?h.toFixed(3)+'Hz':h.toFixed(1)+'Hz'};
const fBpm=v=>Math.round(40+(v/127)*260)+' BPM';
const fPch=v=>{const s=Math.round((v/127)*48-24);return(s>=0?'+':'')+s+'st'};
const fCnt=v=>{if(v===64)return'0c';const c=Math.round((v/127)*200-100);return(c>=0?'+':'')+c+'c'};
const fDet=v=>{if(v===64)return'0 Hz';const d=((v/127)*2-1)*12;return(d>=0?'+':'')+d.toFixed(1)+' Hz'};
const fPDp=v=>{const s=Math.round((v/64-1)*24);return(s>=0?'+':'')+s+'st'};
const fDB=v=>{const d=Math.round((v/127)*24-12);return(d>=0?'+':'')+d+'dB'};
const fPct=v=>Math.round((v/127)*100)+'%';
const fDly=v=>Math.round(5+(v/127)*1495)+'ms';
const fSt=v=>Math.round((v/127)*24)+'st';
const fLDly=v=>{if(!v)return'0ms';const m=Math.round(Math.pow(v/127,2)*4000);return m<1000?m+'ms':(m/1000).toFixed(2)+'s'};
const fRaw=v=>String(v);
const fModMs=v=>(v/127*50).toFixed(1)+'ms';

/* === SECTION + CONTROL DEFINITIONS === */
const SECTIONS=[
{label:'Oscillator 1',led:'var(--or)',groups:[
  {label:'Wave & Tuning',controls:[
    {cc:CC.OSC1_WAVE,l:'WAVE',t:'select',opts:WAVE_OPTS},

/* === STATE === */
const MAX_CC=131;
const state=new Uint8Array(MAX_CC);
const ccDefs={};// cc -> {l, t, fmt, opts, el}

function initDefaults(){
  state.fill(0);
  state[CC.OSC1_PITCH_OFFSET]=64;state[CC.OSC2_PITCH_OFFSET]=64;
  state[CC.OSC1_FINE_TUNE]=64;state[CC.OSC2_FINE_TUNE]=64;
  state[CC.OSC1_DETUNE]=64;state[CC.OSC2_DETUNE]=64;
  state[CC.OSC1_MIX]=127;state[CC.FILTER_CUTOFF]=127;
  state[CC.FILTER_ENV_AMOUNT]=65;state[CC.FILTER_KEY_TRACK]=65;
  state[CC.AMP_SUSTAIN]=127;state[CC.FILTER_ENV_SUSTAIN]=127;
  state[CC.PITCH_ENV_DEPTH]=64;
  state[CC.FX_DRY_MIX]=127;state[CC.FX_JPFX_MIX]=127;
  state[CC.AMP_MOD_FIXED_LEVEL]=127;state[CC.PITCH_BEND_RANGE]=12;
  state[CC.FX_MOD_DEPTH]=4;state[CC.FX_MOD_BASE_DELAY]=13;
}
initDefaults();

/* === KNOB CANVAS === */
const SZ=44,KR=17,KFR=11,A0=2.36,ASW=4.71;
function drawKnob(cv,v,hi){
  const c=cv.getContext('2d'),cx=SZ/2,cy=SZ/2;c.clearRect(0,0,SZ,SZ);
  const n=v/127,ea=A0+n*ASW;
  c.beginPath();c.arc(cx,cy,KR-2,A0,A0+ASW);c.strokeStyle='#0a1018';c.lineWidth=3.5;c.lineCap='round';c.stroke();
  if(n>0){c.beginPath();c.arc(cx,cy,KR-2,A0,ea);c.strokeStyle=hi?'#ffa040':'#f08020';c.lineWidth=3.5;c.stroke()}
  const g=c.createRadialGradient(cx-2,cy-3,1,cx,cy,KFR);g.addColorStop(0,'#222838');g.addColorStop(1,'#0a1018');
  c.beginPath();c.arc(cx,cy,KFR,0,Math.PI*2);c.fillStyle=g;c.fill();c.strokeStyle=hi?'#f08020':'#2e3a50';c.lineWidth=1;c.stroke();
  const dr=KFR-4;c.beginPath();c.arc(cx+dr*Math.cos(ea),cy+dr*Math.sin(ea),2,0,Math.PI*2);c.fillStyle=hi?'#fff':'#c0c8e0';c.fill();
}

/* === ELEMENT BUILDERS === */
function mkKnob(cc,def){
  const w=document.createElement('div');w.className='kw';w.dataset.cc=cc;
  const cv=document.createElement('canvas');cv.width=SZ;cv.height=SZ;
  const lb=document.createElement('div');lb.className='kl';lb.textContent=def.l;
  const vd=document.createElement('div');vd.className='kv';vd.dataset.ccv=cc;
  w.append(cv,lb,vd);drawKnob(cv,state[cc]||0,false);
  vd.textContent=def.fmt?(def.fmt(state[cc]||0)):state[cc]||0;
  cv.addEventListener('mousedown',e=>{drag={cc,y:e.clientY,v0:state[cc]||0,w};w.classList.add('active');e.preventDefault()});
  cv.addEventListener('touchstart',e=>{const t=e.touches[0];drag={cc,y:t.clientY,v0:state[cc]||0,w};w.classList.add('active');e.preventDefault()},{passive:false});
  cv.addEventListener('wheel',e=>{e.preventDefault();onCC(cc,(state[cc]||0)+(e.deltaY<0?1:-1))},{passive:false});
  cv.addEventListener('dblclick',()=>onCC(cc,64));
  return w;
}
function mkSelect(cc,def){
  const w=document.createElement('div');w.className='ew';
  const lb=document.createElement('div');lb.className='el';lb.textContent=def.l;
  const s=document.createElement('select');s.className='es';s.dataset.ccs=cc;
  def.opts.forEach(o=>{const op=document.createElement('option');op.value=o.v;op.textContent=o.l;s.append(op)});
  setSelV(s,def,state[cc]||0);s.addEventListener('change',()=>onCC(cc,+s.value));
  w.append(lb,s);return w;
}
function mkToggle(cc,def){
  const w=document.createElement('div');w.className='tw';
  const on=(state[cc]||0)>=64;
  const b=document.createElement('div');b.className='tb'+(on?' on':'');b.dataset.cct=cc;b.textContent=on?'ON':'OFF';
  const lb=document.createElement('div');lb.className='tl';lb.textContent=def.l;
  b.addEventListener('click',()=>onCC(cc,(state[cc]||0)>=64?0:127));
  w.append(b,lb);return w;
}
function setSelV(s,def,v){let best=def.opts[0],bd=999;def.opts.forEach(o=>{const d=Math.abs(o.v-v);if(d<bd){bd=d;best=o}});s.value=best.v}

/* === STEP GRID WIDGET === */
// Internal storage: 16 step values (0-127), CC 64 = midpoint
const seqSteps=new Uint8Array(16).fill(64);
let seqDrag=null;

function mkStepGrid(cc,def){
  const wrap=document.createElement('div');wrap.className='seq-grid';wrap.id='seq-grid';
  const nSteps=16;
  for(let i=0;i<nSteps;i++){
    const step=document.createElement('div');step.className='seq-step';step.dataset.step=i;
    const barWrap=document.createElement('div');barWrap.className='seq-bar-wrap';
    const mid=document.createElement('div');mid.className='seq-mid';
    const bar=document.createElement('div');bar.className='seq-bar';bar.id='seq-bar-'+i;
    const valLbl=document.createElement('div');valLbl.className='seq-bar-val';valLbl.id='seq-val-'+i;valLbl.textContent='0';
    const num=document.createElement('div');num.className='seq-step-num';num.id='seq-num-'+i;num.textContent=i+1;
    barWrap.append(mid,bar,valLbl);step.append(barWrap,num);wrap.append(step);

    // Interaction: click/drag to set step value
    const setFromY=(e)=>{
      const rect=barWrap.getBoundingClientRect();
      const y=((e.touches?e.touches[0]:e).clientY-rect.top)/rect.height;
      // y=0 → top → CC 127, y=1 → bottom → CC 0
      const val=Math.round(Math.max(0,Math.min(127,(1-y)*127)));
      seqSteps[i]=val;
      drawStepBar(i);
      // Send via MIDI: select step, then send value
      onCC(CC.SEQ_STEP_SELECT,i);
      onCC(CC.SEQ_STEP_VALUE,val);
    };
    barWrap.addEventListener('mousedown',e=>{seqDrag={step:i,wrap:barWrap};setFromY(e);e.preventDefault()});
    barWrap.addEventListener('touchstart',e=>{seqDrag={step:i,wrap:barWrap};setFromY(e);e.preventDefault()},{passive:false});
  }
  // Global move handlers for dragging across bars
  document.addEventListener('mousemove',e=>{
    if(!seqDrag)return;
    // Check if mouse has moved to a different bar
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(el){
      const stepEl=el.closest('.seq-step');
      if(stepEl){
        const idx=+stepEl.dataset.step;
        seqDrag.step=idx;
        const bw=stepEl.querySelector('.seq-bar-wrap');
        seqDrag.wrap=bw;
      }
    }
    const rect=seqDrag.wrap.getBoundingClientRect();
    const y=(e.clientY-rect.top)/rect.height;
    const val=Math.round(Math.max(0,Math.min(127,(1-y)*127)));
    seqSteps[seqDrag.step]=val;
    drawStepBar(seqDrag.step);
    onCC(CC.SEQ_STEP_SELECT,seqDrag.step);
    onCC(CC.SEQ_STEP_VALUE,val);
  });
  document.addEventListener('touchmove',e=>{
    if(!seqDrag)return;
    const t=e.touches[0];
    const rect=seqDrag.wrap.getBoundingClientRect();
    const y=(t.clientY-rect.top)/rect.height;
    const val=Math.round(Math.max(0,Math.min(127,(1-y)*127)));
    seqSteps[seqDrag.step]=val;
    drawStepBar(seqDrag.step);
    onCC(CC.SEQ_STEP_SELECT,seqDrag.step);
    onCC(CC.SEQ_STEP_VALUE,val);
  },{passive:false});
  document.addEventListener('mouseup',()=>{seqDrag=null});
  document.addEventListener('touchend',()=>{seqDrag=null});

  // Draw all bars initially
  requestAnimationFrame(()=>{for(let i=0;i<16;i++)drawStepBar(i)});
  return wrap;
}

function drawStepBar(i){
  const bar=document.getElementById('seq-bar-'+i);
  const lbl=document.getElementById('seq-val-'+i);
  if(!bar||!lbl)return;
  const v=seqSteps[i];
  const bipolar=(v-64)/63;  // -1.0 to +1.0 approx
  const dispVal=v===64?'0':(v>64?'+':'')+Math.round(bipolar*100);
  lbl.textContent=dispVal;

  // Remove both direction classes
  bar.classList.remove('neg');
  if(v>=64){
    // Positive: bar grows up from center
    const pct=((v-64)/63)*50;
    bar.style.height=pct+'%';
    bar.style.bottom='50%';
    bar.style.top='auto';
  } else {
    // Negative: bar grows down from center
    bar.classList.add('neg');
    const pct=((64-v)/64)*50;
    bar.style.height=pct+'%';
    bar.style.top='50%';
    bar.style.bottom='auto';
  }
}

/* === BUILD UI === */
function buildUI(){
  const root=document.getElementById('panels');
  SECTIONS.forEach((sec,si)=>{
    const div=document.createElement('div');div.className='sec';div.id='sec-'+si;
    // Header
    const hdr=document.createElement('div');hdr.className='sec-hdr';
    hdr.innerHTML=`<div class="sec-led" style="background:${sec.led};box-shadow:0 0 6px ${sec.led}"></div><div class="sec-title">${sec.label}</div>${sec.badge?`<div class="sec-badge">${sec.badge}</div>`:''}<div class="sec-chevron">▼</div>`;
    hdr.addEventListener('click',()=>{div.classList.toggle('closed')});
    // Body
    const body=document.createElement('div');body.className='sec-body';
    sec.groups.forEach(grp=>{
      const g=document.createElement('div');g.className='grp';
      g.innerHTML=`<div class="grp-label">${grp.label}</div>`;
      const row=document.createElement('div');row.className='grp-row';
      grp.controls.forEach(ctrl=>{
        let el;
        if(ctrl.t==='knob') el=mkKnob(ctrl.cc,ctrl);
        else if(ctrl.t==='select') el=mkSelect(ctrl.cc,ctrl);
        else if(ctrl.t==='toggle') el=mkToggle(ctrl.cc,ctrl);
        else if(ctrl.t==='stepgrid') el=mkStepGrid(ctrl.cc,ctrl);
        if(el){row.append(el);ccDefs[ctrl.cc]=ctrl}
      });
      g.append(row);body.append(g);
    });
    div.append(hdr,body);root.append(div);
  });
}

/* === CC CHANGE === */
function onCC(cc,v){const c=Math.max(0,Math.min(127,v));state[cc]=c;refresh(cc);statusBar(cc,c);midiSend(cc,c)}
function refresh(cc){
  const def=ccDefs[cc];if(!def)return;const v=state[cc]||0;
  const kw=document.querySelector(`.kw[data-cc="${cc}"]`);
  if(kw){drawKnob(kw.querySelector('canvas'),v,drag&&drag.cc===+cc);const vd=kw.querySelector(`[data-ccv="${cc}"]`);if(vd)vd.textContent=def.fmt?def.fmt(v):v}
  const s=document.querySelector(`select[data-ccs="${cc}"]`);if(s)setSelV(s,def,v);
  const b=document.querySelector(`[data-cct="${cc}"]`);if(b){const on=v>=64;b.classList.toggle('on',on);b.textContent=on?'ON':'OFF'}
}

/* === DRAG (mouse + touch) === */
let drag=null;
document.addEventListener('mousemove',e=>{if(!drag)return;onCC(drag.cc,Math.round(drag.v0+(drag.y-e.clientY)))});
document.addEventListener('touchmove',e=>{if(!drag)return;const t=e.touches[0];onCC(drag.cc,Math.round(drag.v0+(drag.y-t.clientY)))},{passive:false});
function endDrag(){if(drag){drag.w.classList.remove('active');const cv=drag.w.querySelector('canvas');if(cv)drawKnob(cv,state[drag.cc]||0,false);drag=null}}
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);

/* === EXPAND / COLLAPSE === */
function expandAll(){document.querySelectorAll('.sec').forEach(s=>s.classList.remove('closed'))}
function collapseAll(){document.querySelectorAll('.sec').forEach(s=>s.classList.add('closed'))}

/* === WEB MIDI === */
let ma=null,mo=null,mch=1;
const chs=document.getElementById('midiCh');
for(let i=1;i<=16;i++){const o=document.createElement('option');o.value=i;o.textContent=i;chs.append(o)}
chs.addEventListener('change',e=>{mch=+e.target.value});
document.getElementById('midiOut').addEventListener('change',e=>{mo=e.target.value?ma.outputs.get(e.target.value):null;updMidi()});
function initMidi(){if(!navigator.requestMIDIAccess){setMS(false);return}navigator.requestMIDIAccess().then(a=>{ma=a;fillOuts();a.onstatechange=fillOuts}).catch(()=>setMS(false))}
function fillOuts(){const s=document.getElementById('midiOut'),prev=s.value;s.innerHTML='<option value="">— no output —</option>';ma.outputs.forEach(o=>{const op=document.createElement('option');op.value=o.id;op.textContent=o.name;if(o.id===prev)op.selected=true;s.append(op)});if(prev&&ma.outputs.has(prev))mo=ma.outputs.get(prev);updMidi()}
function updMidi(){setMS(!!mo);document.getElementById('stout').textContent=mo?mo.name:'—'}
function setMS(ok){document.getElementById('mdot').className='midi-dot'+(ok?' ok':'')}
function midiSend(cc,v){if(!mo||cc>127)return;mo.send([0xB0|((mch-1)&0xF),cc&0x7F,v&0x7F])}
function sendAll(){let n=0;Object.keys(ccDefs).forEach(cc=>{const c=+cc;if(c<=127){midiSend(c,state[c]||0);n++}});for(let i=0;i<16;i++){midiSend(CC.SEQ_STEP_SELECT,i);midiSend(CC.SEQ_STEP_VALUE,seqSteps[i]);n+=2}toast('Sent '+n+' CCs')}

/* === STATUS === */
function statusBar(cc,v){const def=ccDefs[cc];document.getElementById('stcc').textContent=cc+(def?' '+def.l:'');document.getElementById('stval').textContent=(def&&def.fmt)?v+' ('+def.fmt(v)+')':v}

/* === PRESETS === */
const SK='jt8000v8';
const gS=()=>{try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}};
const sS=s=>localStorage.setItem(SK,JSON.stringify(s));
function refBank(){const s=gS(),sel=document.getElementById('pbank'),prev=sel.value;sel.innerHTML='<option value="">— select —</option>';Object.keys(s).sort().forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;if(n===prev)o.selected=true;sel.append(o)})}
function savePreset(){const name=document.getElementById('pname').value.trim();if(!name){toast('Enter name');return}const snap={};Object.keys(ccDefs).forEach(cc=>{snap[cc]=state[+cc]||0});snap._seqSteps=Array.from(seqSteps);const s=gS();s[name]=snap;sS(s);refBank();toast('Saved: '+name)}
function loadPreset(){const name=document.getElementById('pbank').value;if(!name){toast('Select preset');return}const snap=gS()[name];if(!snap){toast('Not found');return}Object.entries(snap).forEach(([cc,v])=>{if(cc==='_seqSteps'){if(Array.isArray(v))v.forEach((sv,i)=>{seqSteps[i]=sv;drawStepBar(i)})}else{state[+cc]=v;refresh(+cc)}});document.getElementById('pname').value=name;document.getElementById('lcd').textContent=name;toast('Loaded: '+name)}
function delPreset(){const name=document.getElementById('pbank').value;if(!name)return;const s=gS();delete s[name];sS(s);refBank();toast('Deleted')}
function initPatch(){initDefaults();seqSteps.fill(64);for(let i=0;i<16;i++)drawStepBar(i);Object.keys(ccDefs).forEach(cc=>refresh(+cc));document.getElementById('pname').value='Init Patch';document.getElementById('lcd').textContent='INIT PATCH';toast('Initialised')}

/* === SERIAL EXPORT === */
function buildSerial(){const name=document.getElementById('pname').value;let o='// JT-8000 Preset: '+name+'\n// PATCH:cc,val;\n\n';Object.keys(ccDefs).sort((a,b)=>+a-+b).forEach(cc=>{const n=+cc,v=state[n]||0,def=ccDefs[n];o+=`PATCH:${n},${v};  // CC${String(n).padStart(3)} ${def.l.padEnd(12)} = ${def.fmt?def.fmt(v):v}${n>127?'  // INTERNAL':''}\n`});o+='\n// Step Sequencer Values (step:value)\n';for(let i=0;i<16;i++){o+=`SEQ_STEP:${i},${seqSteps[i]};  // Step ${String(i+1).padStart(2)} = ${seqSteps[i]===64?'0':(seqSteps[i]>64?'+':'')+Math.round(((seqSteps[i]-64)/63)*100)+'%'}\n`}return o}
function openModal(){document.getElementById('sout').textContent=buildSerial();document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function copySerial(){navigator.clipboard.writeText(document.getElementById('sout').textContent).then(()=>toast('Copied'))}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal()});

/* === TOAST === */
let tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2100)}

/* === INIT === */
buildUI();initMidi();refBank();
</script>
</body>
</html>
