; =============================================================================
; PlatformIO Project Configuration — JT-8000 Synthesizer
; =============================================================================
;
; BUILD REQUIREMENTS:
;   - Teensy 4.1 with PSRAM
;   - PlatformIO with teensy platform
;   - USB type MUST be USB_MIDI_AUDIO_SERIAL for:
;       usbMIDI   (USB device MIDI — DAW/PC)
;       AudioInputUSB / AudioOutputUSB (USB audio — DAW monitor)
;       Serial    (debug logging)
;
; WHY -IJTEENSY8000 IS CRITICAL:
;   The project uses a local Audio.h override (sketch-folder shadow) that
;   pre-includes Synth_Waveform.h to replace AudioSynthWaveformModulated
;   with AudioSynthWaveformJT.  The compiler must find the project's Audio.h
;   BEFORE the Teensy Audio library's Audio.h.  Without -IJTEENSY8000 in the
;   include path, the override is skipped and AudioMixer4, AudioAmplifier,
;   AudioSynthWaveformDc etc. may not resolve — depending on the platform's
;   default include order.
;
; CLOCK:
;   Firmware calls set_arm_clock(816000000) at runtime.  No PlatformIO flag
;   needed — the Teensy core honours the runtime call.
; =============================================================================

[platformio]
src_dir = JTEENSY8000

[env]
platform  = teensy
framework = arduino
board     = teensy41

; ---------------------------------------------------------------------------
; Common build flags shared by all environments
; ---------------------------------------------------------------------------
[common]
firmware_version = 1.0
build_flags =
    ; ── USB type: MIDI + Audio + Serial ──────────────────────────────────────
    ; Required for usbMIDI, AudioInputUSB/AudioOutputUSB, and Serial debug.
    ; Without this, usbMIDI is undeclared and USB audio endpoints are missing.
    -D USB_MIDI_AUDIO_SERIAL

    ; ── Source folder in include path ────────────────────────────────────────
    ; Ensures the local Audio.h override is found before the library copy.
    ; This is the #1 reason other machines fail to compile: without it the
    ; compiler picks up the Teensy Audio library's Audio.h directly, bypassing
    ; the guard trick in our Audio.h that substitutes AudioSynthWaveformJT.
    -IJTEENSY8000

; ---------------------------------------------------------------------------
; Default build environment
; ---------------------------------------------------------------------------
[env:default]
build_flags =
    ${common.build_flags}

custom_firmware_name = DEFAULT
